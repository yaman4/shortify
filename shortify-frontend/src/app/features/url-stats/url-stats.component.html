<div *ngIf="stats">
  <p><strong>Original URL:</strong> {{ stats.originalUrl }}</p>
  <p><strong>Short Code:</strong> {{ stats.shortCode }}</p>
  <p><strong>Redirect Count:</strong> {{ stats.redirectCount }}</p>
  <p><strong>Risk Level:</strong> {{ stats.riskLevel }}</p>
  <p><strong>AI Checked:</strong> {{ stats.aiChecked }}</p>
</div>
